<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1C1E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#805AD5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="240" ry="240" fill="url(#bg_gradient)" />
  
  <!-- Glow effect -->
  <circle cx="300" cy="300" r="400" fill="#805AD5" opacity="0.1" />
  
  <!-- Tiles -->
  <g transform="translate(512, 512) scale(0.8)">
    <!-- Blue "1" tile -->
    <g transform="translate(-250, -250)">
      <rect width="200" height="200" rx="24" ry="24" fill="url(#blue_gradient)" />
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="white">1</text>
    </g>
    
    <!-- Red "2" tile -->
    <g transform="translate(50, -250)">
      <rect width="200" height="200" rx="24" ry="24" fill="url(#red_gradient)" />
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="white">2</text>
    </g>
    
    <!-- White "3" tile -->
    <g transform="translate(-100, 50)">
      <rect width="200" height="200" rx="24" ry="24" fill="white" />
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="black">3</text>
    </g>
  </g>
</svg>
