<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dysphor App Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --primary-purple: #7F5AF0;
            --dark-neutral-bg: #16161A;
            --dark-card-bg: #24263A;
            --light-text: #E0E0E0;
            --subtle-text: #94A3B8;
            --accent-green: #2CB67D;
            --accent-red: #FF6B6B; /* For break timer or alerts */
        }

        .bg-primary-purple { background-color: var(--primary-purple); }
        .text-primary-purple { color: var(--primary-purple); }
        .border-primary-purple { border-color: var(--primary-purple); }
        .bg-dark-neutral { background-color: var(--dark-neutral-bg); }
        .bg-dark-card { background-color: var(--dark-card-bg); }
        .text-light { color: var(--light-text); }
        .text-subtle { color: var(--subtle-text); }
        .text-accent-green { color: var(--accent-green); }
        .border-accent-green { border-color: var(--accent-green); }
        .text-accent-red { color: var(--accent-red); }


        /* iPhone 15 Pro Shell */
        .iphone-15-pro-shell {
            width: 405px;
            height: 870px;
            background: #111;
            border-radius: 60px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 2px #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iphone-screen {
            width: 393px;
            height: 852px;
            background-color: var(--primary-purple); /* Main app background */
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* iOS-like Status Bar */
        .status-bar {
            height: 44px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--light-text);
            font-size: 14px;
            font-weight: 500;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background-color: rgba(36, 38, 58, 0.3);
            backdrop-filter: blur(10px);
        }
        .status-bar .time { font-weight: 600; }
        .status-bar .icons i { margin-left: 6px; }

        /* Notch */
        .iphone-screen::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 30px;
            background: #111;
            border-radius: 0 0 15px 15px;
            z-index: 110;
        }

        .app-content {
            flex-grow: 1;
            padding-top: 44px;
            padding-bottom: 70px;
            overflow-y: auto;
            color: var(--light-text);
        }
        .app-content::-webkit-scrollbar { display: none; }
        .app-content { -ms-overflow-style: none; scrollbar-width: none; }

        /* Navigation Bar */
        .navigation-bar {
            height: 70px;
            background-color: rgba(36, 38, 58, 0.7);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: var(--subtle-text);
        }
        .nav-item {
            cursor: pointer;
            text-align: center;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            flex-grow: 1;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item span { font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--primary-purple); background-color: rgba(127, 90, 240, 0.15); }
        .nav-item:hover:not(.active) { color: var(--light-text); background-color: rgba(255, 255, 255, 0.05); }

        .screen { padding: 20px; min-height: 100%; }

        /* Pomodoro Timer Styles */
        .timer-container {
            width: 260px; height: 260px; border-radius: 50%;
            background: linear-gradient(145deg, #2a2c41, #202234);
            box-shadow: inset 8px 8px 16px #1c1e2e, inset -8px -8px 16px #2c2e4a, 0 0 30px rgba(127, 90, 240, 0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
        }
        .timer-progress { position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: rotate(-90deg); }
        .timer-progress circle { fill: none; stroke-width: 12; stroke-linecap: round; }
        .timer-progress .track { stroke: rgba(255,255,255,0.1); }
        .timer-progress .progress { stroke: var(--accent-green); stroke-dasharray: 691; stroke-dashoffset: 691; transition: stroke-dashoffset 1s linear, stroke 0.5s linear; }
        .timer-text { font-size: 48px; font-weight: 700; color: var(--light-text); }
        .timer-status { font-size: 16px; color: var(--subtle-text); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .timer-buttons button {
            background-color: var(--dark-card-bg); color: var(--light-text); border: none; border-radius: 50%;
            width: 56px; height: 56px; font-size: 22px; margin: 0 10px;
            box-shadow: 4px 4px 8px #1c1e2e, -4px -4px 8px #2c2e4a; transition: all 0.2s ease-in-out;
        }
        .timer-buttons button:hover { background-color: #30324c; }
        .timer-buttons button:active { box-shadow: inset 2px 2px 4px #1c1e2e, inset -2px -2px 4px #2c2e4a; transform: scale(0.95); }
        .timer-buttons .play-pause-btn {
            background-color: var(--primary-purple); color: white; width: 70px; height: 70px; font-size: 28px;
            box-shadow: 4px 4px 10px rgba(127, 90, 240, 0.4), -4px -4px 8px #2c2e4a;
        }

        /* Milestone Card Styles */
        .milestone-card {
            background-color: var(--dark-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); display: flex; align-items: center; transition: transform 0.2s ease-in-out;
        }
        .milestone-card:hover { transform: translateY(-5px); }
        .milestone-card .emoji { font-size: 36px; margin-right: 16px; padding: 10px; background-color: rgba(127, 90, 240, 0.15); border-radius: 12px; }
        .milestone-info h3 { font-size: 18px; font-weight: 600; color: var(--light-text); }
        .milestone-info p { font-size: 13px; color: var(--subtle-text); }
        .milestone-countdown { margin-left: auto; text-align: right; }
        .milestone-countdown .days { font-size: 28px; font-weight: 700; color: var(--primary-purple); }
        .milestone-countdown .label { font-size: 12px; color: var(--subtle-text); }

        /* Settings Styles */
        .setting-item {
            background-color: var(--dark-card-bg); border-radius: 15px; padding: 16px 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .setting-item label { font-size: 16px; color: var(--light-text); }
        .setting-item input[type="number"] {
            width: 60px; background-color: #30324c; color: var(--light-text); border: 1px solid #4a4c63;
            border-radius: 8px; padding: 6px 8px; text-align: center;
        }
        .setting-item .streak-count { font-size: 18px; font-weight: 600; color: var(--accent-green); }
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30324c; transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-purple); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Screen Header */
        .screen-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .screen-header h1 { font-size: 28px; font-weight: 700; color: var(--light-text); }
        .screen-header .action-icon { font-size: 22px; color: var(--subtle-text); cursor: pointer; }
        .screen-header .action-icon:hover { color: var(--light-text); }

        /* Pomodoro History Styles */
        .history-item {
            background-color: var(--dark-card-bg);
            border-radius: 15px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item-info { flex-grow: 1; }
        .history-item-title { font-size: 16px; font-weight: 500; color: var(--light-text); margin-bottom: 4px; }
        .history-item-details { font-size: 12px; color: var(--subtle-text); }
        .history-item-actions button { background: none; border: none; color: var(--subtle-text); font-size: 16px; cursor: pointer; margin-left: 12px; }
        .history-item-actions button:hover { color: var(--primary-purple); }
        .history-item-title-input {
            background-color: #30324c;
            color: var(--light-text);
            border: 1px solid var(--primary-purple);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 16px;
            width: 100%; /* Take available width */
        }
        .no-history-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--subtle-text);
            font-size: 16px;
        }
        .no-history-message i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            color: var(--primary-purple);
            opacity: 0.5;
        }

    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen p-4 md:p-8">

    <div class="iphone-15-pro-shell">
        <div class="iphone-screen">
            <div class="status-bar">
                <span class="time">9:41</span>
                <div class="icons">
                    <i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <div class="app-content">
                <div id="pomodoroScreen" class="screen">
                    <div class="screen-header"><h1>专注时钟</h1><i class="fas fa-ellipsis-h action-icon"></i></div>
                    <div class="flex flex-col items-center space-y-8">
                        <div class="timer-container">
                            <svg class="timer-progress" width="260" height="260" viewBox="0 0 240 240">
                                <circle class="track" cx="120" cy="120" r="110" />
                                <circle class="progress" id="pomodoroProgressCircle" cx="120" cy="120" r="110" />
                            </svg>
                            <div id="timerDisplay" class="timer-text">25:00</div>
                            <div id="timerStatus" class="timer-status">开始工作</div>
                        </div>
                        <div class="timer-buttons flex justify-center items-center space-x-4">
                            <button title="重置" id="resetBtn"><i class="fas fa-redo"></i></button>
                            <button id="playPauseBtn" class="play-pause-btn" title="播放/暂停"><i class="fas fa-play"></i></button>
                            <button title="跳过" id="skipBtn"><i class="fas fa-forward-step"></i></button>
                        </div>
                        <div class="w-full space-y-3 pt-6">
                            <div class="bg-dark-card p-4 rounded-xl flex justify-between items-center">
                                <div class="flex items-center"><i class="fas fa-check-circle text-accent-green mr-3 text-lg"></i><span class="text-light">已完成番茄钟</span></div>
                                <span id="completedCycles" class="text-light font-semibold">0/4</span>
                            </div>
                            <div class="bg-dark-card p-4 rounded-xl flex justify-between items-center">
                                <div class="flex items-center"><i class="fas fa-stopwatch text-primary-purple mr-3 text-lg"></i><span class="text-light">总专注时长</span></div>
                                <span id="totalFocusTime" class="text-light font-semibold">0h 0m</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="milestonesScreen" class="screen hidden">
                    <div class="screen-header"><h1>纪念日</h1><i class="fas fa-plus action-icon" title="添加新纪念日"></i></div>
                    <div class="space-y-4">
                        <div class="milestone-card"><span class="emoji">🎉</span><div class="milestone-info"><h3>项目截止日期</h3><p>最终提交 - Dysphor App</p></div><div class="milestone-countdown"><div class="days">15</div><div class="label">天</div></div></div>
                        <div class="milestone-card"><span class="emoji">✈️</span><div class="milestone-info"><h3>下次休假</h3><p>海滩之旅!</p></div><div class="milestone-countdown"><div class="days">48</div><div class="label">天</div></div></div>
                        <div class="milestone-card"><span class="emoji">🎂</span><div class="milestone-info"><h3>朋友生日</h3><p>小明</p></div><div class="milestone-countdown"><div class="days">7</div><div class="label">天</div></div></div>
                        <button class="w-full mt-4 bg-primary-purple/20 text-primary-purple py-3 rounded-lg font-semibold hover:bg-primary-purple/30 transition-colors"><i class="fas fa-plus mr-2"></i> 添加新的纪念日</button>
                    </div>
                </div>
                
                <div id="pomodoroHistoryScreen" class="screen hidden">
                    <div class="screen-header"><h1>番茄记录</h1> <i class="fas fa-trash-alt action-icon" id="clearHistoryBtn" title="清空记录"></i></div>
                    <div id="historyListContainer" class="space-y-3">
                        <div class="no-history-message">
                            <i class="fas fa-box-open"></i>
                            还没有任何记录哦，完成一个番茄钟来开始吧！
                        </div>
                    </div>
                </div>

                <div id="settingsScreen" class="screen hidden">
                    <div class="screen-header"><h1>设置</h1></div>
                    <h2 class="text-xl font-semibold text-subtle mb-3 mt-2">番茄钟设置</h2>
                    <div class="setting-item"><label for="workDuration">工作时长 (分钟)</label><input type="number" id="workDurationInput" value="25"></div>
                    <div class="setting-item"><label for="breakDuration">休息时长 (分钟)</label><input type="number" id="breakDurationInput" value="5"></div>
                    <div class="setting-item"><label for="longBreakDuration">长休息时长 (分钟)</label><input type="number" id="longBreakDurationInput" value="15"></div>
                    <div class="setting-item"><label for="sessionsBeforeLongBreak">长休息间隔 (番茄钟数)</label><input type="number" id="sessionsBeforeLongBreakInput" value="4"></div>
                    <h2 class="text-xl font-semibold text-subtle mb-3 mt-6">通知</h2>
                    <div class="setting-item"><label>声音提醒</label><label class="toggle-switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                    <div class="setting-item"><label>震动提醒</label><label class="toggle-switch"><input type="checkbox"><span class="slider"></span></label></div>
                    <h2 class="text-xl font-semibold text-subtle mb-3 mt-6">专注数据</h2>
                    <div class="setting-item"><span>当前连胜</span><span class="streak-count">🔥 12 天</span></div>
                    <div class="bg-dark-card p-4 rounded-xl mt-2">
                        <p class="text-center text-subtle">生产力图表将显示在此处</p>
                        <img src="https://placehold.co/300x150/24263A/94A3B8?text=生产力图表&font=Inter" alt="生产力图表占位符" class="w-full h-auto rounded-lg mt-2 opacity-70">
                    </div>
                </div>
            </div>

            <div class="navigation-bar">
                <div class="nav-item active" data-screen="pomodoroScreen"><i class="fas fa-clock"></i><span>专注</span></div>
                <div class="nav-item" data-screen="milestonesScreen"><i class="fas fa-calendar-alt"></i><span>纪念日</span></div>
                <div class="nav-item" data-screen="pomodoroHistoryScreen"><i class="fas fa-history"></i><span>记录</span></div>
                <div class="nav-item" data-screen="settingsScreen"><i class="fas fa-cog"></i><span>设置</span></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const screens = document.querySelectorAll('.screen');
            
            // Pomodoro Timer Elements
            const playPauseBtn = document.getElementById('playPauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const skipBtn = document.getElementById('skipBtn');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerStatus = document.getElementById('timerStatus');
            const progressCircle = document.getElementById('pomodoroProgressCircle');
            const completedCyclesDisplay = document.getElementById('completedCycles');
            const totalFocusTimeDisplay = document.getElementById('totalFocusTime');

            // Settings Inputs
            const workDurationInput = document.getElementById('workDurationInput');
            const breakDurationInput = document.getElementById('breakDurationInput');
            const longBreakDurationInput = document.getElementById('longBreakDurationInput');
            const sessionsBeforeLongBreakInput = document.getElementById('sessionsBeforeLongBreakInput');

            // Pomodoro History Elements
            const historyListContainer = document.getElementById('historyListContainer');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');

            const POMODORO_STATES = { WORK: '工作', BREAK: '休息', LONG_BREAK: '长休' };
            const circumference = 2 * Math.PI * 110; // r = 110 from SVG
            progressCircle.style.strokeDasharray = circumference;
            
            let pomodoroSettings = {
                workDuration: 25 * 60,
                breakDuration: 5 * 60,
                longBreakDuration: 15 * 60,
                sessionsBeforeLongBreak: 4
            };

            let isPlaying = false;
            let currentTime; // in seconds
            let intervalId = null;
            let currentMode = POMODORO_STATES.WORK;
            let cyclesCompleted = 0;
            let totalFocusSeconds = 0;

            // Pomodoro History Data
            let pomodoroHistory = [
                // { id: Date.now() + 1, title: "完成原型设计初稿", date: "2025-05-14", duration: "25分钟", completedAt: new Date(Date.now() - 86400000).toISOString() },
                // { id: Date.now() + 2, title: "回顾用户需求文档", date: "2025-05-13", duration: "25分钟", completedAt: new Date(Date.now() - 2*86400000).toISOString() }
            ];


            function updateSettingsFromUI() {
                pomodoroSettings.workDuration = parseInt(workDurationInput.value) * 60;
                pomodoroSettings.breakDuration = parseInt(breakDurationInput.value) * 60;
                pomodoroSettings.longBreakDuration = parseInt(longBreakDurationInput.value) * 60;
                pomodoroSettings.sessionsBeforeLongBreak = parseInt(sessionsBeforeLongBreakInput.value);
                resetTimer(); // Reset timer with new settings
            }

            workDurationInput.addEventListener('change', updateSettingsFromUI);
            breakDurationInput.addEventListener('change', updateSettingsFromUI);
            longBreakDurationInput.addEventListener('change', updateSettingsFromUI);
            sessionsBeforeLongBreakInput.addEventListener('change', updateSettingsFromUI);


            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
            }

            function updateTotalFocusTimeDisplay() {
                const hours = Math.floor(totalFocusSeconds / 3600);
                const minutes = Math.floor((totalFocusSeconds % 3600) / 60);
                totalFocusTimeDisplay.textContent = `${hours}h ${minutes}m`;
            }
            
            function updateTimerDisplay() {
                timerDisplay.textContent = formatTime(currentTime);
                let totalDurationForMode;
                if (currentMode === POMODORO_STATES.WORK) totalDurationForMode = pomodoroSettings.workDuration;
                else if (currentMode === POMODORO_STATES.BREAK) totalDurationForMode = pomodoroSettings.breakDuration;
                else totalDurationForMode = pomodoroSettings.longBreakDuration;

                const progress = ((totalDurationForMode - currentTime) / totalDurationForMode) * circumference;
                progressCircle.style.strokeDashoffset = Math.max(0, circumference - progress); // Ensure not negative
            }

            function startTimer() {
                isPlaying = true;
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                timerStatus.textContent = currentMode === POMODORO_STATES.WORK ? '专注中...' : (currentMode === POMODORO_STATES.BREAK ? '休息中...' : '长休中...');
                
                if (intervalId) clearInterval(intervalId); // Clear existing interval if any

                intervalId = setInterval(() => {
                    if (currentTime > 0) {
                        currentTime--;
                        if (currentMode === POMODORO_STATES.WORK) {
                            totalFocusSeconds++;
                            updateTotalFocusTimeDisplay();
                        }
                        updateTimerDisplay();
                    } else {
                        handleSessionEnd();
                    }
                }, 1000);
            }

            function pauseTimer() {
                isPlaying = false;
                clearInterval(intervalId);
                intervalId = null;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                timerStatus.textContent = '已暂停';
            }
            
            function resetTimer(mode = POMODORO_STATES.WORK, resetCycles = true) {
                pauseTimer();
                currentMode = mode;
                if (resetCycles) {
                    cyclesCompleted = 0;
                    completedCyclesDisplay.textContent = `${cyclesCompleted}/${pomodoroSettings.sessionsBeforeLongBreak}`;
                }

                if (mode === POMODORO_STATES.WORK) {
                    currentTime = pomodoroSettings.workDuration;
                    timerStatus.textContent = '开始工作';
                    progressCircle.style.stroke = 'var(--accent-green)';
                } else if (mode === POMODORO_STATES.BREAK) {
                    currentTime = pomodoroSettings.breakDuration;
                    timerStatus.textContent = '开始休息';
                    progressCircle.style.stroke = 'var(--accent-red)';
                } else { // Long Break
                    currentTime = pomodoroSettings.longBreakDuration;
                    timerStatus.textContent = '开始长休';
                    progressCircle.style.stroke = 'var(--accent-red)';
                }
                updateTimerDisplay();
            }

            function handleSessionEnd() {
                pauseTimer();
                // alert(`${currentMode}时间到!`); // Replace with a nicer notification

                if (currentMode === POMODORO_STATES.WORK) {
                    cyclesCompleted++;
                    completedCyclesDisplay.textContent = `${cyclesCompleted}/${pomodoroSettings.sessionsBeforeLongBreak}`;
                    addPomodoroToHistory(`番茄钟 #${pomodoroHistory.length + 1}`, pomodoroSettings.workDuration);
                    
                    if (cyclesCompleted % pomodoroSettings.sessionsBeforeLongBreak === 0) {
                        resetTimer(POMODORO_STATES.LONG_BREAK, false);
                    } else {
                        resetTimer(POMODORO_STATES.BREAK, false);
                    }
                } else { // Break or Long Break ended
                    resetTimer(POMODORO_STATES.WORK, false);
                }
                // Optionally auto-start next session
                // startTimer(); 
            }

            playPauseBtn.addEventListener('click', () => {
                if (isPlaying) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            resetBtn.addEventListener('click', () => resetTimer(POMODORO_STATES.WORK, true));
            skipBtn.addEventListener('click', handleSessionEnd);


            // Tab Navigation Logic
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const targetScreenId = item.dataset.screen;
                    screens.forEach(screen => screen.classList.add('hidden'));
                    document.getElementById(targetScreenId).classList.remove('hidden');

                    if (targetScreenId === 'pomodoroHistoryScreen') {
                        renderPomodoroHistory();
                    }
                });
            });

            // --- Pomodoro History Logic ---
            function renderPomodoroHistory() {
                historyListContainer.innerHTML = ''; // Clear previous items

                if (pomodoroHistory.length === 0) {
                    historyListContainer.innerHTML = `
                        <div class="no-history-message">
                            <i class="fas fa-box-open"></i>
                            还没有任何记录哦，完成一个番茄钟来开始吧！
                        </div>`;
                    return;
                }
                
                // Sort by most recent first
                const sortedHistory = [...pomodoroHistory].sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));

                sortedHistory.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'history-item';
                    itemDiv.dataset.id = item.id;

                    const completedDate = new Date(item.completedAt);
                    const formattedDate = `${completedDate.toLocaleDateString()} ${completedDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

                    itemDiv.innerHTML = `
                        <div class="history-item-info">
                            <div class="history-item-title">${item.title}</div>
                            <div class="history-item-details">${formattedDate} - ${item.duration}</div>
                        </div>
                        <div class="history-item-actions">
                            <button class="edit-history-btn" title="编辑标题"><i class="fas fa-pencil-alt"></i></button>
                        </div>
                    `;
                    historyListContainer.appendChild(itemDiv);

                    // Edit button event listener
                    itemDiv.querySelector('.edit-history-btn').addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent other clicks if any
                        enableHistoryItemEdit(itemDiv, item.id);
                    });
                });
            }

            function enableHistoryItemEdit(itemDiv, itemId) {
                const titleElement = itemDiv.querySelector('.history-item-title');
                const currentTitle = titleElement.textContent;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentTitle;
                input.className = 'history-item-title-input';
                
                titleElement.replaceWith(input);
                input.focus();

                const actionsDiv = itemDiv.querySelector('.history-item-actions');
                actionsDiv.innerHTML = `<button class="save-history-btn" title="保存"><i class="fas fa-save"></i></button>`;

                const saveButton = actionsDiv.querySelector('.save-history-btn');

                function saveEdit() {
                    const newTitle = input.value.trim() || "未命名番茄钟";
                    updatePomodoroHistoryTitle(itemId, newTitle);
                    renderPomodoroHistory(); // Re-render to show updated item and restore buttons
                }

                saveButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveEdit();
                });
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        saveEdit();
                    }
                });
                input.addEventListener('blur', () => {
                    // Small delay to allow save button click to register
                    setTimeout(() => {
                        // If input is still there (not replaced by save), means save wasn't clicked
                        if (document.body.contains(input)) {
                           renderPomodoroHistory(); // Revert to display mode if blurred without saving
                        }
                    }, 100);
                });
            }

            function updatePomodoroHistoryTitle(id, newTitle) {
                const itemIndex = pomodoroHistory.findIndex(item => item.id === id);
                if (itemIndex > -1) {
                    pomodoroHistory[itemIndex].title = newTitle;
                }
            }
            
            function addPomodoroToHistory(title, durationSeconds) {
                const newEntry = {
                    id: Date.now(),
                    title: title,
                    duration: formatTime(durationSeconds),
                    completedAt: new Date().toISOString()
                };
                pomodoroHistory.push(newEntry);
                console.log("Pomodoro session recorded!", newEntry);
                // If history screen is active, update it
                if (document.getElementById('pomodoroHistoryScreen').offsetParent !== null) {
                    renderPomodoroHistory();
                }
            }

            if (clearHistoryBtn) {
                clearHistoryBtn.addEventListener('click', () => {
                    if (confirm("确定要清空所有番茄记录吗？此操作无法撤销。")) {
                        pomodoroHistory = [];
                        renderPomodoroHistory();
                        console.log("Pomodoro history cleared.");
                    }
                });
            }

            // Initial Setup
            resetTimer(POMODORO_STATES.WORK, true); // Initialize timer to work mode
            updateTotalFocusTimeDisplay();
            renderPomodoroHistory(); // Initial render for history if any data exists
        });
    </script>
</body>
</html>
