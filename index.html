<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>神将GO (Blade Clash) - 狂怒AI版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background-color: #000010; /* Darker space background */
            color: white;
        }
        #game-arena {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #world {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
        }
        #star-container {
            position: absolute;
            width: 4000px;
            height: 4000px;
            top: -2000px;
            left: -2000px;
            z-index: -1;
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .character { position: absolute; will-change: transform; transition: transform 0.1s linear; }
        .blades-container {
            position: absolute;
            top: 50%; left: 50%;
            width: 1px; height: 1px;
            animation: spin 6s linear infinite;
            transform-origin: 0 0;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .blade {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            transition: transform 0.2s ease-out, color 0.2s ease-out, font-size 0.2s ease-out;
        }
        .character-label {
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap; z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .collectable-blade { position: absolute; transition: transform 0.1s linear; }
        #game-over-screen { transition: opacity 0.5s; }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
        }
        .charge-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background-color: rgba(255, 107, 107, 0.5);
            opacity: 0;
            transition: width 0.2s ease-out, height 0.2s ease-out, opacity 0.2s ease-out;
            z-index: -1;
        }
        .is-charging .charge-indicator {
            width: 200%;
            height: 200%;
            opacity: 1;
        }
    </style>
</head>
<body class="select-none">

    <div id="game-arena">
        <div id="world">
            <div id="particle-container"></div>
            <template id="character-template">
                <div class="character">
                    <div class="relative w-full h-full">
                        <div class="character-core absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-white flex items-center justify-center">
                            <i class="fas text-lg"></i>
                        </div>
                        <div class="blades-container"></div>
                        <div class="character-label">
                            <span class="name font-mono"></span>
                            <span class="count-wrapper ml-2 px-2 py-0.5 rounded-full"></span>
                        </div>
                        <div class="charge-indicator"></div>
                    </div>
                </div>
            </template>
            <div id="player" class="character" style="z-index: 10;">
                <div class="relative w-full h-full">
                    <div class="character-core absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-yellow-400 rounded-full border-2 border-white flex items-center justify-center">
                        <i class="fas fa-user text-xl text-gray-800"></i>
                    </div>
                    <div class="blades-container"></div>
                    <div class="character-label">
                        <i class="fas fa-user mr-2"></i>You
                        <span id="player-blade-count" class="ml-2 px-2 py-0.5 rounded-full">1</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="hud" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50">
        <div class="absolute top-5 right-5 w-64 bg-black/40 p-4 rounded-xl shadow-lg backdrop-blur-sm border border-gray-500/50">
            <h3 class="font-bold text-lg text-center border-b border-gray-500 pb-2 mb-3"><i class="fas fa-trophy text-yellow-400 mr-2"></i>排行榜</h3>
            <ul id="leaderboard" class="space-y-2 text-sm"></ul>
        </div>
        <div id="joystick" class="absolute bottom-10 left-10 pointer-events-auto">
            <div class="w-40 h-40 bg-black/30 rounded-full flex items-center justify-center border-2 border-gray-500/50 backdrop-blur-sm">
                <div id="joystick-thumb" class="w-20 h-20 bg-gray-400/80 rounded-full shadow-inner relative transition-transform duration-75"></div>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="fixed inset-0 bg-black/70 flex flex-col items-center justify-center z-50 opacity-0 pointer-events-none hidden">
        <h2 class="text-6xl font-bold text-red-500 mb-4">游戏结束</h2>
        <button id="restart-button" class="mt-4 px-8 py-4 bg-blue-600 text-white font-bold rounded-lg text-2xl hover:bg-blue-700 pointer-events-auto">重新开始</button>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- DOM Elements ---
    const world = document.getElementById('world');
    const particleContainer = document.getElementById('particle-container');
    const playerEl = document.getElementById('player');
    const joystick = document.getElementById('joystick');
    const joystickThumb = document.getElementById('joystick-thumb');
    const gameOverScreen = document.getElementById('game-over-screen');
    const restartButton = document.getElementById('restart-button');
    const leaderboardEl = document.getElementById('leaderboard');

    // --- Game State ---
    let player, enemies, collectables, particles;
    let joystickActive = false;
    let moveVector = { x: 0, y: 0 };
    let gameRunning = false;
    let animationFrameId;
    let camera = { x: 0, y: 0 };
    let enemySpawnTicker = 0;

    // --- Game Configuration ---
    const PLAYER_SPEED = 3;
    // --- MODIFIED: More collectables ---
    const MAX_COLLECTABLES = 120;
    const COLLECTABLE_SPAWN_RATE = 1000;
    const CAMERA_LERP_FACTOR = 0.08;
    const MAGNETIC_PICKUP_RADIUS = 150;
    const MAGNETIC_FORCE = 4;
    const ENEMY_SPAWN_INTERVAL = 3000; 
    const CLASH_COOLDOWN = 200; // ms per damage tick
    const CHARGE_DISTANCE = 300; // Distance for Hunter to start charging
    const CHARGE_SPEED_MULTIPLIER = 3; // How much faster a Hunter charges
    const CHARGE_DURATION = 500; // ms

    const tailwindColors = {
        'red-500': '#ef4444', 'red-600': '#dc2626',
        'green-400': '#4ade80', 'green-600': '#16a34a',
        'gray-500': '#6b7280', 'white': '#ffffff', 'yellow-400': '#facc15',
        'cyan-400': '#22d3ee', 'purple-500': '#a855f7', 'orange-500': '#f97316'
    };

    const ENEMY_TYPES = {
        SCOUT: {
            name: 'Scout',
            baseSpeed: 2.2,
            colorClass: 'text-cyan-400',
            hexColor: tailwindColors['cyan-400'],
            iconClass: 'fa-shoe-prints',
            behavior: 'scavenger', 
            baseBlades: 3,
        },
        BRUTE: {
            name: 'Brute',
            baseSpeed: 0.9,
            colorClass: 'text-purple-500',
            hexColor: tailwindColors['purple-500'],
            iconClass: 'fa-shield-halved',
            behavior: 'standard',
            baseBlades: 20,
        },
        HUNTER: {
            name: 'Hunter',
            baseSpeed: 1.6,
            colorClass: 'text-orange-500',
            hexColor: tailwindColors['orange-500'],
            iconClass: 'fa-meteor',
            behavior: 'charger', 
            baseBlades: 8,
        }
    };

    function createStarryBackground() {
        const oldContainer = document.getElementById('star-container');
        if (oldContainer) oldContainer.remove();

        const starContainer = document.createElement('div');
        starContainer.id = 'star-container';
        world.insertBefore(starContainer, world.firstChild);

        const starCount = 500;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            starContainer.appendChild(star);
        }
    }


    function createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            const particleEl = document.createElement('div');
            particleEl.className = 'particle';
            const size = Math.random() * 5 + 2;
            particleEl.style.width = `${size}px`;
            particleEl.style.height = `${size}px`;
            particleEl.style.backgroundColor = color;
            particleContainer.appendChild(particleEl);
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 8 + 1;
            const particle = {
                el: particleEl, x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                lifespan: 30,
            };
            particles.push(particle);
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.lifespan--;
            p.vy += 0.1; 
            p.x += p.vx;
            p.y += p.vy;
            if (p.lifespan <= 0) {
                p.el.remove();
                particles.splice(i, 1);
            } else {
                p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
            }
        }
    }

    class Character {
        constructor(element, initialBlades, name = 'Player', type = null) {
            this.el = element;
            this.name = name;
            this.bladeCount = initialBlades;
            this.pos = { x: 0, y: 0 };
            this.radius = 20; 
            this.bladesRadius = 0;
            this.moveVector = { x: 0, y: 0 };
            this.active = true;
            this.lastClashTime = 0;
            this.type = type;
            this.speed = type ? type.baseSpeed : PLAYER_SPEED;
            this.behavior = type ? type.behavior : 'player';
            this.isCharging = false;
            this.chargeEndTime = 0;
            this.target = null;
            this.updateBladeVisuals();
        }

        update() {
            if (!this.active) return;
            this.pos.x += this.moveVector.x;
            this.pos.y += this.moveVector.y;
            this.el.style.transform = `translate(${this.pos.x}px, ${this.pos.y}px)`;

            if (this.isCharging) {
                this.el.classList.add('is-charging');
                if(Date.now() > this.chargeEndTime) {
                    this.isCharging = false;
                    this.el.classList.remove('is-charging');
                }
            }
        }

        updateBladeVisuals() {
            const container = this.el.querySelector('.blades-container');
            if (!container) return;
            container.innerHTML = '';
            
            const {colorClass, hexColor, size, labelBg, labelBorder} = this.getBladeStyle();
            this.bladesRadius = this.calculateBladesRadius();
            this.hexColor = this.type ? this.type.hexColor : hexColor;
            
            const angleStep = this.bladeCount > 1 ? 360 / this.bladeCount : 0;
            for (let i = 0; i < this.bladeCount; i++) {
                const blade = document.createElement('i');
                blade.className = `blade fas fa-moon ${this.type ? this.type.colorClass : colorClass} ${size}`;
                blade.style.transform = `rotate(${angleStep * i}deg) translate(${this.bladesRadius}px) rotate(-90deg)`;
                container.appendChild(blade);
            }
            
            this.el.style.width = this.el.style.height = `${this.bladesRadius * 2 + 50}px`;
            const label = this.el.querySelector('.character-label');
            const countWrapper = this.el.querySelector('.count-wrapper') || this.el.querySelector('#player-blade-count');
            countWrapper.textContent = this.bladeCount;
            if (label) label.className = `character-label ${labelBg} border-2 ${labelBorder}`;
        }
        
        getBladeStyle() {
            if (this.bladeCount >= 100) return { colorClass: 'text-red-500', hexColor: tailwindColors['red-500'], size: 'text-4xl', labelBg: 'bg-red-600', labelBorder: 'border-red-400' };
            if (this.bladeCount >= 10) return { colorClass: 'text-green-400', hexColor: tailwindColors['green-400'], size: 'text-3xl', labelBg: 'bg-green-600', labelBorder: 'border-green-400' };
            return { colorClass: 'text-white', hexColor: tailwindColors['white'], size: 'text-2xl', labelBg: 'bg-gray-500', labelBorder: 'border-gray-300' };
        }
        calculateBladesRadius() { 
             return Math.min(30 + this.bladeCount * 1.2, 250);
        }

        takeClashDamage() {
            this.bladeCount--;
            this.updateBladeVisuals();
            if (this.bladeCount <= 0) {
                this.die();
            }
        }

        die() {
            if (!this.active) return;
            this.active = false;
            createParticles(this.pos.x, this.pos.y, 30, this.hexColor);
            this.el.style.display = 'none';
            if (this === player) {
                endGame();
            }
        }
    }
    
    function initGame() {
        gameOverScreen.classList.add('hidden', 'opacity-0');
        world.querySelectorAll('.character:not(#player), .collectable-blade').forEach(el => el.remove());
        particleContainer.innerHTML = '';
        playerEl.style.display = 'block';

        createStarryBackground();

        player = new Character(playerEl, 10, 'You');
        player.pos = {x: 0, y: 0};
        camera = { x: player.pos.x, y: player.pos.y };

        enemies = [
            createEnemy(ENEMY_TYPES.BRUTE, {x: 400, y: 300}),
            createEnemy(ENEMY_TYPES.HUNTER, {x: -300, y: -200}),
            createEnemy(ENEMY_TYPES.SCOUT, {x: -300, y: 400}),
        ];
        
        collectables = [];
        particles = [];
        // --- MODIFIED: Spawn more collectables at the start ---
        for(let i=0; i<80; i++) spawnCollectable();

        enemySpawnTicker = Date.now();
        gameRunning = true;
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
        gameLoop();
    }
    
    function createEnemy(type, pos) {
        const template = document.getElementById('character-template');
        const enemyEl = template.content.cloneNode(true).firstElementChild;
        enemyEl.querySelector('.name').textContent = type.name;
        enemyEl.querySelector('i.fas').className = `fas ${type.iconClass} text-lg`;
        enemyEl.querySelector('.character-core').style.borderColor = type.hexColor;

        const id = `${type.name}_${Date.now() % 10000}`;
        enemyEl.id = id;
        world.appendChild(enemyEl);

        const bladeCount = type.baseBlades + Math.floor(Math.random() * 5);
        const enemy = new Character(enemyEl, bladeCount, id, type);
        enemy.pos = pos;
        enemy.el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
        return enemy;
    }
    
    function spawnCollectable(centerPos = {x: 0, y: 0}) {
        if (!gameRunning || collectables.length >= MAX_COLLECTABLES) return;
        const bladeEl = document.createElement('i');
        bladeEl.className = 'collectable-blade fas fa-moon text-white text-xl transform -rotate-45';
        
        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * window.innerWidth;
        const x = centerPos.x + Math.cos(angle) * distance;
        const y = centerPos.y + Math.sin(angle) * distance;

        const c = { el: bladeEl, pos: { x, y }, radius: 15 };
        bladeEl.style.transform = `translate(${x}px, ${y}px)`;
        world.appendChild(bladeEl);
        collectables.push(c);
    }
    setInterval(() => spawnCollectable(player ? player.pos : {x:0, y:0}), COLLECTABLE_SPAWN_RATE);

    function isColliding(objA, objB) {
        const dx = objA.pos.x - objB.pos.x;
        const dy = objA.pos.y - objB.pos.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        return distance < (objA.bladesRadius || objA.radius) + (objB.bladesRadius || objB.radius);
    }

    function checkCollisions() {
        const allChars = [player, ...enemies].filter(c => c.active);

        for (const char of allChars) {
            for (let i = collectables.length - 1; i >= 0; i--) {
                const c = collectables[i];
                if (isColliding(char, c)) { 
                    char.bladeCount++;
                    char.updateBladeVisuals();
                    c.el.remove();
                    collectables.splice(i, 1);
                }
            }
        }
        
        const now = Date.now();
        for (let i = 0; i < allChars.length; i++) {
            for (let j = i + 1; j < allChars.length; j++) {
                const charA = allChars[i];
                const charB = allChars[j];

                if (isColliding(charA, charB)) {
                    if (now > charA.lastClashTime + CLASH_COOLDOWN) {
                        charA.lastClashTime = now;
                        charA.takeClashDamage();
                    }
                    if (now > charB.lastClashTime + CLASH_COOLDOWN) {
                        charB.lastClashTime = now;
                        charB.takeClashDamage();
                    }

                    const dx = charA.pos.x - charB.pos.x;
                    const dy = charA.pos.y - charB.pos.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    const sparkX = charB.pos.x + (dx/dist) * charB.bladesRadius;
                    const sparkY = charB.pos.y + (dy/dist) * charB.bladesRadius;
                    createParticles(sparkX, sparkY, 2, tailwindColors['yellow-400']);
                }
            }
        }
    }

    function updateMagneticPickup() {
        if (!player || !player.active) return;
        for (const c of collectables) {
            const dx = player.pos.x - c.pos.x;
            const dy = player.pos.y - c.pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < MAGNETIC_PICKUP_RADIUS) {
                const force = 1 - (dist / MAGNETIC_PICKUP_RADIUS);
                c.pos.x += (dx / dist) * MAGNETIC_FORCE * force;
                c.pos.y += (dy / dist) * MAGNETIC_FORCE * force;
                c.el.style.transform = `translate(${c.pos.x}px, ${c.pos.y}px)`;
            }
        }
    }

    function dynamicEnemySpawner() {
        if (!player || !player.active) return;
        if (Date.now() - enemySpawnTicker > ENEMY_SPAWN_INTERVAL && enemies.filter(e => e.active).length < 25) {
            enemySpawnTicker = Date.now();
            const angle = Math.random() * 2 * Math.PI;
            const distance = (window.innerWidth / 2) + 100;
            const spawnPos = {
                x: player.pos.x + Math.cos(angle) * distance,
                y: player.pos.y + Math.sin(angle) * distance,
            };

            const enemyTypeKeys = Object.keys(ENEMY_TYPES);
            const randomTypeKey = enemyTypeKeys[Math.floor(Math.random() * enemyTypeKeys.length)];
            const randomType = ENEMY_TYPES[randomTypeKey];
            
            enemies.push(createEnemy(randomType, spawnPos));
        }
    }
    
    // --- REWRITTEN: AI logic is now universal for charging ---
    function updateAI() {
        if (!player || !player.active) {
             enemies.forEach(enemy => {
                 if (Math.random() < 0.02) {
                    enemy.moveVector = { x: (Math.random() - 0.5) * enemy.speed, y: (Math.random() - 0.5) * enemy.speed };
                 }
            });
            return;
        };

        enemies.forEach(enemy => {
            if(!enemy.active) return;

            const dx = player.pos.x - enemy.pos.x;
            const dy = player.pos.y - enemy.pos.y;
            const distToPlayer = Math.sqrt(dx*dx + dy*dy) || 1;
            
            const isStronger = enemy.bladeCount > player.bladeCount;

            // --- UNIVERSAL CHARGE LOGIC ---
            // Any enemy that is stronger and gets close will initiate a charge.
            if (isStronger && !enemy.isCharging && distToPlayer < CHARGE_DISTANCE) {
                enemy.isCharging = true;
                enemy.chargeEndTime = Date.now() + CHARGE_DURATION;
            }

            const currentSpeed = enemy.isCharging ? enemy.speed * CHARGE_SPEED_MULTIPLIER : enemy.speed;

            // --- MOVEMENT DECISION LOGIC ---
            if (isStronger || enemy.isCharging) {
                // ACTION: HUNT or CHARGE the player
                enemy.moveVector.x = (dx / distToPlayer) * currentSpeed;
                enemy.moveVector.y = (dy / distToPlayer) * currentSpeed;
            } else {
                // ACTION: WEAKER THAN PLAYER - Decide to flee or scavenge
                
                // Scouts have a special behavior: they prefer scavenging if the player isn't too close.
                if (enemy.behavior === 'scavenger' && distToPlayer > 250) {
                    // Find and move towards the nearest collectable blade
                    let closestCollectable = null;
                    let minSqDist = Infinity;
                    for(const c of collectables) {
                        const cdx = c.pos.x - enemy.pos.x;
                        const cdy = c.pos.y - enemy.pos.y;
                        const cSqDist = cdx*cdx + cdy*cdy; // Use squared distance for performance
                        if(cSqDist < minSqDist) {
                            minSqDist = cSqDist;
                            closestCollectable = c;
                        }
                    }
                    if(closestCollectable) {
                         const cdx = closestCollectable.pos.x - enemy.pos.x;
                         const cdy = closestCollectable.pos.y - enemy.pos.y;
                         const cDist = Math.sqrt(minSqDist);
                         enemy.moveVector.x = (cdx / cDist) * enemy.speed;
                         enemy.moveVector.y = (cdy / cDist) * enemy.speed;
                    } else { // No collectables found, just wander randomly
                        if (Math.random() < 0.02) {
                            enemy.moveVector = { x: (Math.random() - 0.5) * enemy.speed, y: (Math.random() - 0.5) * enemy.speed };
                        }
                    }
                } else {
                    // All other weaker enemies (or scouts that are too close to the player) will flee.
                    enemy.moveVector.x = -(dx / distToPlayer) * enemy.speed;
                    enemy.moveVector.y = -(dy / distToPlayer) * enemy.speed;
                }
            }
        });
    }

    function updateLeaderboard() {
        const allChars = [player, ...enemies].filter(c => c && c.active);
        allChars.sort((a, b) => b.bladeCount - a.bladeCount);
        leaderboardEl.innerHTML = allChars.slice(0, 5).map(char => {
            const isPlayer = char === player;
            const iconClass = isPlayer ? 'fa-user' : (char.type ? char.type.iconClass : 'fa-robot');
            const colorClass = isPlayer ? 'text-yellow-400' : (char.type ? char.type.colorClass : 'text-gray-300');
            const name = isPlayer ? 'You' : char.type.name;

            return `<li class="flex justify-between items-center ${isPlayer ? 'bg-white/10 rounded-md px-2 py-1' : ''}">
                <span><i class="fas ${iconClass} ${colorClass} w-5 text-center mr-2"></i>${name}</span>
                <span class="font-bold">${char.bladeCount}</span>
            </li>`;
        }).join('');
    }

    function updateCamera() {
        if (!player) return;
        const targetX = player.pos.x;
        const targetY = player.pos.y;
        camera.x += (targetX - camera.x) * CAMERA_LERP_FACTOR;
        camera.y += (targetY - camera.y) * CAMERA_LERP_FACTOR;
        
        const translateX = -camera.x + window.innerWidth / 2;
        const translateY = -camera.y + window.innerHeight / 2;

        world.style.transform = `translate(${translateX}px, ${translateY}px)`;
    }

    function gameLoop() {
        if (!gameRunning) return;

        player.moveVector = { x: moveVector.x * PLAYER_SPEED, y: moveVector.y * PLAYER_SPEED };
        updateAI();
        
        [player, ...enemies].forEach(c => c.active && c.update());
        
        updateMagneticPickup();
        checkCollisions();
        dynamicEnemySpawner();

        updateParticles();
        updateLeaderboard();
        updateCamera();

        animationFrameId = requestAnimationFrame(gameLoop);
    }
    
    function endGame() {
        if (!gameRunning) return;
        gameRunning = false;
        
        gameOverScreen.classList.remove('hidden');
        setTimeout(() => gameOverScreen.classList.remove('opacity-0'), 10);

        if(animationFrameId) cancelAnimationFrame(animationFrameId);
    }

    function handleJoystick(e) {
        e.preventDefault();
        const touch = e.type.includes('touch') ? e.touches[0] : e;
        if (!touch) return;
        const rect = joystick.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const deltaX = touch.clientX - centerX;
        const deltaY = touch.clientY - centerY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        if(distance === 0) {
            moveVector = {x: 0, y: 0};
            return;
        }
        const maxDist = rect.width / 4;
        moveVector.x = deltaX / distance;
        moveVector.y = deltaY / distance;
        const thumbDist = Math.min(distance, maxDist);
        joystickThumb.style.transform = `translate(${thumbDist * moveVector.x}px, ${thumbDist * moveVector.y}px)`;
    }
    function stopJoystick() {
        joystickActive = false;
        moveVector = { x: 0, y: 0 };
        joystickThumb.style.transform = 'translate(0,0)';
    }
    joystick.addEventListener('mousedown', (e) => { joystickActive = true; handleJoystick(e); });
    document.addEventListener('mousemove', (e) => { if (joystickActive) handleJoystick(e); });
    document.addEventListener('mouseup', () => stopJoystick());
    joystick.addEventListener('touchstart', (e) => { joystickActive = true; handleJoystick(e); }, { passive: false });
    document.addEventListener('touchmove', (e) => { if (joystickActive) handleJoystick(e); }, { passive: false });
    document.addEventListener('touchend', () => stopJoystick());
    restartButton.addEventListener('click', initGame);

    initGame();
});
</script>

</body>
</html>
