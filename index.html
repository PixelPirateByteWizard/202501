<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchemist's Palette</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Custom font and basic styles */
        @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Noto+Sans:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans', sans-serif;
            touch-action: none; /* Prevents page scrolling on mobile when dragging */
        }
        .title-font {
             font-family: 'IM Fell English SC', serif;
        }
        /* Animation effects */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .fall-down {
             animation: fallDown 0.3s ease-in;
        }
        @keyframes fallDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-800 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Main game container -->
    <div id="game-container" class="w-full max-w-md mx-auto bg-slate-900 rounded-2xl shadow-2xl p-4 sm:p-6 space-y-4">

        <!-- Game title and info -->
        <header class="text-center border-b-2 border-slate-700 pb-4">
            <h1 class="text-3xl sm:text-4xl font-bold text-amber-300 title-font">Alchemist's Palette</h1>
        </header>

        <!-- Level info bar -->
        <div class="flex justify-between items-center bg-slate-800/50 rounded-lg p-3">
            <div>
                <span class="text-lg font-bold text-cyan-300">Level 1</span>
                <p id="level-desc" class="text-sm text-slate-300">Novice Alchemist</p>
            </div>
            <div class="text-right">
                <div class="text-lg font-bold text-yellow-300">
                    <i class="fas fa-coins"></i>
                    <span id="score">0</span>
                </div>
                <div class="text-lg font-bold text-white">
                    <i class="fas fa-shoe-prints"></i>
                    <span id="moves">30</span>
                </div>
            </div>
        </div>
        
        <!-- Level objectives -->
        <div id="objectives-container" class="bg-slate-800/50 rounded-lg p-3">
            <h3 class="font-bold mb-2 text-center text-amber-200 title-font text-xl">Alchemist's Order</h3>
            <div id="objectives-list" class="flex justify-center items-center space-x-4 text-xl">
                <!-- Objectives will be dynamically generated by JS -->
            </div>
        </div>


        <!-- P5.js game board -->
        <div id="canvas-container" class="relative w-full aspect-square rounded-lg overflow-hidden bg-slate-700 shadow-inner">
            <!-- p5 canvas will be inserted here -->
        </div>

        <!-- Synthesis rules -->
        <div id="synthesis-rules" class="bg-slate-800/50 rounded-lg p-3 text-center">
            <h3 class="font-bold mb-2 text-amber-200 title-font text-xl">Synthesis Rules</h3>
            <div class="flex justify-around items-center text-slate-300 text-sm sm:text-base">
                <div class="flex items-center space-x-1">
                    <span class="w-4 h-4 rounded-full" style="background-color: #ff5050; border: 1px solid #ffaaaa;"></span>
                    <span>+</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #ffdc32; border: 1px solid #fff0a0;"></span>
                    <span>→</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #ff9632; border: 1px solid #ffc890;"></span>
                </div>
                <div class="flex items-center space-x-1">
                    <span class="w-4 h-4 rounded-full" style="background-color: #ff5050; border: 1px solid #ffaaaa;"></span>
                    <span>+</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #3296ff; border: 1px solid #a0c8ff;"></span>
                    <span>→</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #b450ff; border: 1px solid #e0b0ff;"></span>
                </div>
                <div class="flex items-center space-x-1">
                    <span class="w-4 h-4 rounded-full" style="background-color: #ffdc32; border: 1px solid #fff0a0;"></span>
                    <span>+</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #3296ff; border: 1px solid #a0c8ff;"></span>
                    <span>→</span>
                    <span class="w-4 h-4 rounded-full" style="background-color: #50dc50; border: 1px solid #b0f0b0;"></span>
                </div>
            </div>
        </div>
        
        <!-- Boosters bar -->
        <div class="flex justify-around items-center pt-4 border-t border-slate-700">
            <button class="bg-gradient-to-br from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 p-3 rounded-full shadow-lg transition-transform transform hover:scale-110 aspect-square w-16 h-16 flex flex-col items-center justify-center">
                <i class="fas fa-wand-magic-sparkles text-2xl"></i>
                <span class="text-xs font-bold">Wand</span>
            </button>
            <button class="bg-gradient-to-br from-teal-500 to-cyan-600 hover:from-teal-600 hover:to-cyan-700 p-3 rounded-full shadow-lg transition-transform transform hover:scale-110 aspect-square w-16 h-16 flex flex-col items-center justify-center">
                <i class="fas fa-eye-dropper text-2xl"></i>
                <span class="text-xs font-bold">Pipette</span>
            </button>
            <button class="bg-gradient-to-br from-rose-500 to-orange-600 hover:from-rose-600 hover:to-orange-700 p-3 rounded-full shadow-lg transition-transform transform hover:scale-110 aspect-square w-16 h-16 flex flex-col items-center justify-center">
                <i class="fas fa-palette text-2xl"></i>
                <span class="text-xs font-bold">Rainbow</span>
            </button>
        </div>

    </div>
    
    <!-- Game Over/Win Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div id="modal-content" class="bg-slate-800 rounded-2xl p-8 text-center shadow-2xl border-2 border-amber-300 fade-in">
            <h2 id="modal-title" class="text-3xl font-bold mb-4 text-yellow-300 title-font">Level Complete!</h2>
            <p id="modal-message" class="text-lg mb-6">You're a genius alchemist!</p>
            <button id="restart-button" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105">
                Next Level
            </button>
        </div>
    </div>


    <script>
        // ===================================================
        // Game Core Logic (p5.js)
        // ===================================================
        const sketch = (p) => {
            const COLS = 8;
            const ROWS = 8;
            let grid = [];
            let cellSize;

            // Color definitions
            const COLORS = {
                RED: p.color(255, 80, 80),
                YELLOW: p.color(255, 220, 50),
                BLUE: p.color(50, 150, 255),
                ORANGE: p.color(255, 150, 50),
                GREEN: p.color(80, 220, 80),
                PURPLE: p.color(180, 80, 255),
                WHITE: p.color(240, 240, 240),
                BLACK: p.color(50, 50, 50),
                PETRIFIED: p.color(150, 150, 150, 200),
            };

            const COLOR_NAMES = {
                'RED': 'red', 'YELLOW': 'yellow', 'BLUE': 'blue',
                'ORANGE': 'orange', 'GREEN': 'green', 'PURPLE': 'purple'
            };
            const REVERSE_COLOR_NAMES = Object.fromEntries(Object.entries(COLOR_NAMES).map(([k, v]) => [v, k]));


            // Element types
            const ELEM_TYPE = {
                PRIMARY: 'primary', // Red, Yellow, Blue
                SECONDARY: 'secondary', // Orange, Green, Purple
                SPECIAL_GLOW: 'glow',
                SPECIAL_BOMB: 'bomb',
                SPECIAL_RAINBOW: 'rainbow',
                OBSTACLE_STONE: 'stone'
            };
            
            // Game state
            let score = 0;
            let moves = 30;
            let objectives = {};
            let isSwapping = false;
            let isFalling = false;
            let selectedDroplet = null;
            let gameOver = false;

            // Level configuration
            const level1 = {
                moves: 30,
                objectives: {
                    'GREEN': 25,
                    'PURPLE': 15,
                },
                obstacles: [
                    {r: 3, c: 3, type: ELEM_TYPE.OBSTACLE_STONE, health: 1},
                    {r: 3, c: 4, type: ELEM_TYPE.OBSTACLE_STONE, health: 1},
                    {r: 4, c: 3, type: ELEM_TYPE.OBSTACLE_STONE, health: 1},
                    {r: 4, c: 4, type: ELEM_TYPE.OBSTACLE_STONE, health: 1},
                ]
            };

            // HTML element references
            const scoreEl = document.getElementById('score');
            const movesEl = document.getElementById('moves');
            const objectivesListEl = document.getElementById('objectives-list');
            const modalEl = document.getElementById('modal');
            const modalTitleEl = document.getElementById('modal-title');
            const modalMessageEl = document.getElementById('modal-message');
            const restartButton = document.getElementById('restart-button');

            class Droplet {
                constructor(r, c, colorName, type) {
                    this.r = r;
                    this.c = c;
                    this.x = c * cellSize + cellSize / 2;
                    this.y = r * cellSize + cellSize / 2;
                    this.targetY = this.y;
                    this.colorName = colorName;
                    this.color = COLORS[colorName];
                    this.type = type;
                    this.health = (type === ELEM_TYPE.OBSTACLE_STONE) ? 1 : 0;
                    this.scale = 1;
                    this.isMatched = false;
                }

                draw() {
                    if (this.isMatched) {
                        this.scale -= 0.1;
                        if (this.scale < 0) this.scale = 0;
                    }
                    
                    this.y = p.lerp(this.y, this.targetY, 0.2);

                    p.push();
                    p.translate(this.x, this.y);
                    p.scale(this.scale);
                    
                    p.noStroke();

                    if (this.type === ELEM_TYPE.OBSTACLE_STONE) {
                        p.fill(this.color);
                        p.rectMode(p.CENTER);
                        p.square(0, 0, cellSize * 0.8, 10);
                        p.fill(0,0,0,50);
                        p.square(0, 0, cellSize * 0.7, 8);
                    } else {
                        // Draw droplet glow
                        p.fill(p.red(this.color), p.green(this.color), p.blue(this.color), 50);
                        p.ellipse(0, 0, cellSize * 0.9, cellSize * 0.9);

                        // Draw droplet body
                        p.fill(this.color);
                        p.ellipse(0, 0, cellSize * 0.8, cellSize * 0.8);

                        // Draw highlight
                        p.fill(255, 255, 255, 150);
                        p.ellipse(-cellSize * 0.15, -cellSize * 0.15, cellSize * 0.25, cellSize * 0.25);
                    }

                    // Draw special element markers
                    if(this.type === ELEM_TYPE.SPECIAL_GLOW) {
                        p.stroke(255);
                        p.strokeWeight(2);
                        p.noFill();
                        p.ellipse(0,0, cellSize * 0.7, cellSize*0.7);
                    } else if (this.type === ELEM_TYPE.SPECIAL_BOMB) {
                        p.fill(255);
                        p.ellipse(0,0, cellSize * 0.2, cellSize*0.2);
                    } else if (this.type === ELEM_TYPE.SPECIAL_RAINBOW) {
                        for(let i=0; i < 5; i++) {
                            p.fill(p.lerpColor(COLORS.RED, COLORS.BLUE, i/4));
                            p.arc(0, 0, cellSize * 0.7 - i*2, cellSize * 0.7 - i*2, p.PI, p.TWO_PI);
                        }
                    }

                    p.pop();
                }
                
                updatePosition(newR, newC) {
                    this.r = newR;
                    this.c = newC;
                    this.x = newC * cellSize + cellSize / 2;
                    this.targetY = newR * cellSize + cellSize / 2;
                }
            }
            
            p.setup = () => {
                const canvasContainer = document.getElementById('canvas-container');
                const canvasSize = canvasContainer.offsetWidth;
                let cnv = p.createCanvas(canvasSize, canvasSize);
                cnv.parent('canvas-container');
                cellSize = p.width / COLS;

                loadLevel(level1);
                restartButton.onclick = () => {
                     modalEl.classList.add('hidden');
                     loadLevel(level1);
                };
            };
            
            function loadLevel(levelData) {
                moves = levelData.moves;
                score = 0;
                objectives = JSON.parse(JSON.stringify(levelData.objectives)); // Deep copy
                gameOver = false;
                
                updateUI();
                initializeGrid(levelData.obstacles);
            }
            
            function updateUI() {
                scoreEl.innerText = score;
                movesEl.innerText = moves;
                
                objectivesListEl.innerHTML = '';
                if(Object.values(objectives).every(v => v <= 0)) {
                    objectivesListEl.innerHTML = '<span class="text-green-400 font-bold">All orders complete!</span>';
                    return;
                }
                
                for(const colorName in objectives) {
                    if (objectives[colorName] > 0) {
                        const count = objectives[colorName];
                        const color = COLORS[colorName];
                        const div = document.createElement('div');
                        div.className = 'flex items-center space-x-2';
                        div.innerHTML = `
                            <div class="w-8 h-8 rounded-full" style="background-color: rgb(${color.levels[0]}, ${color.levels[1]}, ${color.levels[2]})"></div>
                            <span class="font-bold text-lg">${count}</span>
                        `;
                        objectivesListEl.appendChild(div);
                    }
                }
            }

            function initializeGrid(obstacles = []) {
                grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
                const obstaclePositions = new Set(obstacles.map(o => `${o.r},${o.c}`));

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (obstaclePositions.has(`${r},${c}`)) {
                            const obsData = obstacles.find(o => o.r === r && o.c === c);
                            grid[r][c] = new Droplet(r, c, 'PETRIFIED', ELEM_TYPE.OBSTACLE_STONE);
                            grid[r][c].health = obsData.health;
                        } else {
                            let randomColorName;
                            do {
                                randomColorName = getRandomPrimaryColor();
                            } while (
                                (c >= 2 && grid[r][c-1].colorName === randomColorName && grid[r][c-2].colorName === randomColorName) ||
                                (r >= 2 && grid[r-1][c].colorName === randomColorName && grid[r-2][c].colorName === randomColorName)
                            );
                            grid[r][c] = new Droplet(r, c, randomColorName, ELEM_TYPE.PRIMARY);
                        }
                    }
                }
            }

            function getRandomPrimaryColor() {
                const primaries = ['RED', 'YELLOW', 'BLUE'];
                return primaries[p.floor(p.random(primaries.length))];
            }

            p.draw = () => {
                p.background(15, 23, 42); // bg-slate-900
                drawGridLines();
                drawDroplets();
            };

            function drawGridLines() {
                p.stroke(48, 59, 83); // slate-700
                p.strokeWeight(1);
                for (let i = 0; i <= COLS; i++) {
                    p.line(i * cellSize, 0, i * cellSize, p.height);
                }
                for (let i = 0; i <= ROWS; i++) {
                    p.line(0, i * cellSize, p.width, i * cellSize);
                }
            }

            function drawDroplets() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c]) {
                            grid[r][c].draw();
                        }
                    }
                }
            }

            p.mousePressed = () => {
                if (gameOver || isSwapping || isFalling || p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) return;

                const c = p.floor(p.mouseX / cellSize);
                const r = p.floor(p.mouseY / cellSize);
                
                if(grid[r][c] && grid[r][c].type !== ELEM_TYPE.OBSTACLE_STONE){
                   selectedDroplet = { r, c };
                }
            };

            p.mouseReleased = () => {
                if (!selectedDroplet || gameOver || isSwapping || isFalling || p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) {
                    selectedDroplet = null;
                    return;
                }

                const c = p.floor(p.mouseX / cellSize);
                const r = p.floor(p.mouseY / cellSize);

                // If it's the same cell or not an adjacent cell, cancel selection
                const distR = Math.abs(r - selectedDroplet.r);
                const distC = Math.abs(c - selectedDroplet.c);

                if ((distR === 1 && distC === 0) || (distR === 0 && distC === 1)) {
                    if(grid[r][c] && grid[r][c].type !== ELEM_TYPE.OBSTACLE_STONE) {
                       handleSwap(selectedDroplet.r, selectedDroplet.c, r, c);
                    }
                }
                selectedDroplet = null;
            };

            async function handleSwap(r1, c1, r2, c2) {
                isSwapping = true;

                const d1 = grid[r1][c1];
                const d2 = grid[r2][c2];
                
                // Check for a valid swap
                const isD1Primary = d1.type === ELEM_TYPE.PRIMARY;
                const isD2Primary = d2.type === ELEM_TYPE.PRIMARY;

                // Rule: Two different primary elements -> Synthesis
                if(isD1Primary && isD2Primary && d1.colorName !== d2.colorName) {
                    await performSynthesis(d1, d2);
                    moves--;
                } 
                // Rule: Two secondary elements -> Match (only if it forms a match)
                else if (!isD1Primary && !isD2Primary && d1.type !== ELEM_TYPE.PRIMARY && d2.type !== ELEM_TYPE.PRIMARY) {
                   await performSwapAndCheckMatch(d1, d2);
                }
                // Rule: A special element and a regular element
                else if ((d1.type.startsWith('special') && !d2.type.startsWith('special')) || (!d1.type.startsWith('special') && d2.type.startsWith('special'))) {
                    await performSwapAndCheckMatch(d1, d2);
                }
                // Invalid swap
                else {
                    // Play a wiggle/bounce-back animation
                    await animateWiggle(d1, d2);
                }
                
                updateUI();
                checkGameState();
                isSwapping = false;
            }
            
            async function performSwapAndCheckMatch(d1, d2) {
                 // Pre-swap
                let temp = grid[d1.r][d1.c];
                grid[d1.r][d1.c] = grid[d2.r][d2.c];
                grid[d2.r][d2.c] = temp;
                
                let tempR = d1.r, tempC = d1.c;
                d1.updatePosition(d2.r, d2.c);
                d2.updatePosition(tempR, tempC);

                let allMatches = findAllMatches();
                
                // Activate special elements
                if (d1.type === ELEM_TYPE.SPECIAL_RAINBOW) {
                    allMatches.push(...handleRainbowEssence(d1, d2));
                } else if (d2.type === ELEM_TYPE.SPECIAL_RAINBOW) {
                     allMatches.push(...handleRainbowEssence(d2, d1));
                }


                if(allMatches.length > 0) {
                     await animateSwap(d1, d2);
                     moves--;
                     await processMatches(allMatches);
                } else {
                     // Swap back
                    temp = grid[d1.r][d1.c];
                    grid[d1.r][d1.c] = grid[d2.r][d2.c];
                    grid[d2.r][d2.c] = temp;
                    tempR = d1.r; tempC = d1.c;
                    d1.updatePosition(d2.r, d2.c);
                    d2.updatePosition(tempR, tempC);
                    await animateWiggle(d1, d2);
                }
            }
            
            async function animateWiggle(d1, d2) {
                // Simple wiggle effect
                const originalX1 = d1.x; const originalY1 = d1.y;
                const originalX2 = d2.x; const originalY2 = d2.y;
                d1.x = (d1.x + d2.x) / 2; d1.y = (d1.y + d2.y) / 2;
                d2.x = originalX1; d2.y = originalY1;
                await new Promise(resolve => setTimeout(resolve, 150));
                d1.x = originalX1; d1.y = originalY1;
                d2.x = originalX2; d2.y = originalY2;
                await new Promise(resolve => setTimeout(resolve, 150));
            }

            async function animateSwap(d1, d2) {
                 // Visually swap positions
                let tempX = d1.x, tempY = d1.y;
                d1.x = d2.x; d1.y = d2.y;
                d2.x = tempX; d2.y = tempY;
                
                await new Promise(resolve => setTimeout(resolve, 200));

                let temp = grid[d1.r][d1.c];
                grid[d1.r][d1.c] = grid[d2.r][d2.c];
                grid[d2.r][d2.c] = temp;

                let tempR = d1.r, tempC = d1.c;
                d1.updatePosition(d2.r, d2.c);
                d2.updatePosition(tempR, tempC);
            }
            
            async function performSynthesis(d1, d2) {
                let newColorName;
                if ((d1.colorName === 'RED' && d2.colorName === 'YELLOW') || (d1.colorName === 'YELLOW' && d2.colorName === 'RED')) {
                    newColorName = 'ORANGE';
                } else if ((d1.colorName === 'RED' && d2.colorName === 'BLUE') || (d1.colorName === 'BLUE' && d2.colorName === 'RED')) {
                    newColorName = 'PURPLE';
                } else if ((d1.colorName === 'YELLOW' && d2.colorName === 'BLUE') || (d1.colorName === 'BLUE' && d2.colorName === 'YELLOW')) {
                    newColorName = 'GREEN';
                }
                
                await animateSwap(d1, d2);

                if (newColorName) {
                    d1.colorName = newColorName;
                    d1.color = COLORS[newColorName];
                    d1.type = ELEM_TYPE.SECONDARY;
                    d2.colorName = newColorName;
                    d2.color = COLORS[newColorName];
                    d2.type = ELEM_TYPE.SECONDARY;
                    d1.scale = 1.2; d2.scale = 1.2;
                    await new Promise(resolve => setTimeout(resolve, 100));
                    d1.scale = 1; d2.scale = 1;
                    
                    // Immediately check for matches after synthesis
                    await processAllMatches();
                }
            }

            async function processAllMatches() {
                let matches;
                while((matches = findAllMatches()).length > 0) {
                    await processMatches(matches);
                }
            }
            
            function handleRainbowEssence(rainbow, other) {
                const targetColor = other.colorName;
                const matched = [];
                for(let r=0; r<ROWS; r++){
                    for(let c=0; c<COLS; c++){
                        if(grid[r][c] && grid[r][c].colorName === targetColor) {
                            matched.push({r,c});
                        }
                    }
                }
                matched.push({r: rainbow.r, c: rainbow.c}); // also remove the rainbow
                return matched;
            }

            function findAllMatches() {
                let matches = [];
                let checked = new Set();
                
                // Find matches activated by special elements
                for(let r=0; r<ROWS; r++){
                    for(let c=0; c<COLS; c++){
                        if(grid[r][c] && grid[r][c].isMatched) {
                             if(grid[r][c].type === ELEM_TYPE.SPECIAL_BOMB) {
                                for(let i=-1; i<=1; i++) {
                                    for(let j=-1; j<=1; j++) {
                                        if (r+i >= 0 && r+i < ROWS && c+j >=0 && c+j < COLS) {
                                            matches.push({r: r+i, c: c+j});
                                        }
                                    }
                                }
                            }
                            if(grid[r][c].type === ELEM_TYPE.SPECIAL_GLOW) {
                                // Clear row and column
                                for(let i=0; i<COLS; i++) matches.push({r: r, c: i});
                                for(let i=0; i<ROWS; i++) matches.push({r: i, c: c});
                            }
                        }
                    }
                }


                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const key = `${r},${c}`;
                        if (checked.has(key)) continue;

                        const droplet = grid[r][c];
                        if (!droplet || droplet.type === ELEM_TYPE.PRIMARY || droplet.type === ELEM_TYPE.OBSTACLE_STONE) continue;

                        // Check horizontal
                        let hMatch = [{ r, c }];
                        for (let i = c + 1; i < COLS; i++) {
                            if (grid[r][i] && grid[r][i].colorName === droplet.colorName) {
                                hMatch.push({ r, c: i });
                            } else break;
                        }
                        if (hMatch.length >= 3) {
                            matches.push(...hMatch);
                            hMatch.forEach(p => checked.add(`${p.r},${p.c}`));
                        }

                        // Check vertical
                        let vMatch = [{ r, c }];
                        for (let i = r + 1; i < ROWS; i++) {
                            if (grid[i][c] && grid[i][c].colorName === droplet.colorName) {
                                vMatch.push({ r: i, c });
                            } else break;
                        }
                        if (vMatch.length >= 3) {
                            matches.push(...vMatch);
                            vMatch.forEach(p => checked.add(`${p.r},${p.c}`));
                        }
                    }
                }
                
                // Remove duplicates
                const uniqueMatches = [];
                const seen = new Set();
                for (const match of matches) {
                    const key = `${match.r},${match.c}`;
                    if (!seen.has(key)) {
                        uniqueMatches.push(match);
                        seen.add(key);
                    }
                }
                return uniqueMatches;
            }
            
            async function processMatches(matches) {
                let specialCreation = null;
                
                // Check for special element creation
                const matchLength = matches.length;
                if(matchLength > 0) {
                     const lastMatchPos = matches[matches.length-1];
                     if (grid[lastMatchPos.r] && grid[lastMatchPos.r][lastMatchPos.c]) {
                        const colorName = grid[lastMatchPos.r][lastMatchPos.c].colorName;
                        if(matchLength === 4) {
                            specialCreation = {r: lastMatchPos.r, c: lastMatchPos.c, type: ELEM_TYPE.SPECIAL_GLOW, colorName: colorName};
                        } else if (matchLength >= 5) {
                            specialCreation = {r: lastMatchPos.r, c: lastMatchPos.c, type: ELEM_TYPE.SPECIAL_RAINBOW, colorName: 'RAINBOW'};
                        }
                     }
                }
                
                // Mark matches and handle score/objectives
                for (const pos of matches) {
                    const droplet = grid[pos.r][pos.c];
                    if (droplet && !droplet.isMatched) {
                        droplet.isMatched = true;
                        
                        // Damage adjacent obstacles
                        for(let i = -1; i <= 1; i++){
                            for(let j = -1; j <= 1; j++){
                                if(Math.abs(i) + Math.abs(j) !== 1) continue; // Only up, down, left, right
                                const nr = pos.r + i;
                                const nc = pos.c + j;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] && grid[nr][nc].type === ELEM_TYPE.OBSTACLE_STONE) {
                                    grid[nr][nc].health--;
                                    if(grid[nr][nc].health <= 0) grid[nr][nc].isMatched = true;
                                }
                            }
                        }

                        // Update score and objectives
                        if (droplet.type !== ELEM_TYPE.OBSTACLE_STONE) {
                             score += 10;
                             const colorNameKey = droplet.colorName;
                             if(objectives[colorNameKey]) {
                                 objectives[colorNameKey] = Math.max(0, objectives[colorNameKey] - 1);
                             }
                        }
                    }
                }

                await new Promise(resolve => setTimeout(resolve, 300)); // Wait for match animation
                
                // Remove matched elements
                for (const pos of matches) {
                    if (grid[pos.r][pos.c] && grid[pos.r][pos.c].isMatched) {
                        grid[pos.r][pos.c] = null;
                    }
                }

                if(specialCreation) {
                    grid[specialCreation.r][specialCreation.c] = new Droplet(specialCreation.r, specialCreation.c, specialCreation.colorName, specialCreation.type);
                }
                
                updateUI();
                await dropAndRefill();
                await processAllMatches(); // Recursively check for chain reactions
            }

            async function dropAndRefill() {
                isFalling = true;
                // Drop elements down
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1;
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (grid[r][c]) {
                            if (r !== emptyRow) {
                                grid[emptyRow][c] = grid[r][c];
                                grid[r][c] = null;
                                grid[emptyRow][c].updatePosition(emptyRow, c);
                            }
                            emptyRow--;
                        }
                    }
                }
                
                // Refill with new elements
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!grid[r][c]) {
                            const newDroplet = new Droplet(r, c, getRandomPrimaryColor(), ELEM_TYPE.PRIMARY);
                            // Place the new droplet off-screen at the top for the fall-down animation
                            newDroplet.y = (r - ROWS) * cellSize + cellSize / 2;
                            grid[r][c] = newDroplet;
                        }
                    }
                }

                await new Promise(resolve => setTimeout(resolve, 400)); // Wait for fall animation to complete
                isFalling = false;
            }
            
            function checkGameState() {
                if(gameOver) return;

                const allObjectivesMet = Object.values(objectives).every(v => v <= 0);

                if (allObjectivesMet) {
                    gameOver = true;
                    showModal(true, 'Level Complete!', "You're a genius alchemist!");
                } else if (moves <= 0) {
                    gameOver = true;
                    showModal(false, 'Out of Moves', "Don't worry, try again!");
                }
            }
            
            function showModal(isWin, title, message) {
                modalTitleEl.innerText = title;
                modalMessageEl.innerText = message;
                restartButton.innerText = isWin ? 'Next Level' : 'Try Again';
                restartButton.className = `font-bold py-3 px-8 rounded-lg text-xl transition-transform transform hover:scale-105 ${isWin ? 'bg-green-500 hover:bg-green-600 text-white' : 'bg-red-500 hover:bg-red-600 text-white'}`;
                modalEl.classList.remove('hidden');
            }

        };

        new p5(sketch);
    </script>
